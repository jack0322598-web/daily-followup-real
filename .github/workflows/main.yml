name: Daily News Auto-Update

on:
  schedule:
    # 매일 한국 시간 오전 7시 (UTC 기준 전날 22:00) 실행
    - cron: '0 22 * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 파이썬 스크립트 실행 (한국 시간 적용 완료)
        run: python main.py

      - name: 업데이트된 HTML 깃허브에 저장
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "🌱 매일 아침 7시 뉴스 자동 업데이트" || echo "변경된 내용이 없습니다."
          git push
