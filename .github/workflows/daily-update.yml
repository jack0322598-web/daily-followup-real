name: Daily News Update

on:
  schedule:
    # GitHub scheduled workflows run from the default branch.
    # Run once per day at 07:00 KST (22:00 UTC on the previous day).
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      news_date:
        description: "Optional KST date to generate manually (YYYY-MM-DD)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-news-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Seoul
      PYTHONIOENCODING: utf-8
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_ISSUE_RANKING_ENABLED: "0"
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Determine target dates
        id: dates
        shell: bash
        env:
          MANUAL_NEWS_DATE: ${{ github.event.inputs.news_date || '' }}
        run: |
          yesterday="$(TZ=Asia/Seoul date -d 'yesterday' +%F)"
          latest_archive="$(find . -maxdepth 1 -name 'archive_*.html' -printf '%f\n' | sed -E 's/^archive_([0-9-]+)\.html$/\1/' | sort | tail -n 1)"

          if [[ -n "$MANUAL_NEWS_DATE" ]]; then
            start_date="$MANUAL_NEWS_DATE"
            end_date="$MANUAL_NEWS_DATE"
          elif [[ -z "$latest_archive" ]]; then
            start_date="$yesterday"
            end_date="$yesterday"
          elif [[ "$latest_archive" < "$yesterday" ]]; then
            start_date="$(TZ=Asia/Seoul date -d "$latest_archive + 1 day" +%F)"
            end_date="$yesterday"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "latest_archive=$latest_archive" >> "$GITHUB_OUTPUT"
            echo "end_date=$yesterday" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "start_date=$start_date" >> "$GITHUB_OUTPUT"
          echo "end_date=$end_date" >> "$GITHUB_OUTPUT"

      - name: Generate daily briefings
        if: steps.dates.outputs.should_run == 'true'
        shell: bash
        run: |
          current="${{ steps.dates.outputs.start_date }}"
          end="${{ steps.dates.outputs.end_date }}"

          while [[ "$current" < "$end" || "$current" == "$end" ]]; do
            echo "Generating briefing for $current"
            AI_SUMMARY_ENABLED=0 python -u main.py --date "$current"
            python -u agent_a.py --date "$current" --selection-archive "archive_${current}.html"
            python -u agent_b.py --date "$current" --fallback-models none --retry-attempts 2
            python -u main.py --date "$current"
            current="$(TZ=Asia/Seoul date -d "$current + 1 day" +%F)"
          done

      - name: Validate generated output
        if: steps.dates.outputs.should_run == 'true'
        shell: bash
        run: |
          latest="${{ steps.dates.outputs.end_date }}"
          archive_file="archive_${latest}.html"

          if [[ ! -f "$archive_file" ]]; then
            echo "Expected archive was not created: $archive_file"
            exit 1
          fi

          news_count="$(grep -o 'class="news-card' "$archive_file" | wc -l | tr -d ' ')"
          echo "News cards found in $archive_file: $news_count"

          if [[ "$news_count" -lt 3 ]]; then
            echo "Generated page has too few news cards."
            exit 1
          fi

      - name: Commit updated files
        id: commit
        if: steps.dates.outputs.should_run == 'true'
        env:
          START_DATE: ${{ steps.dates.outputs.start_date }}
          END_DATE: ${{ steps.dates.outputs.end_date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$START_DATE" = "$END_DATE" ]; then
            git commit -m "chore: update daily briefing for ${END_DATE}"
          else
            git commit -m "chore: backfill daily briefings ${START_DATE}..${END_DATE}"
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD:${GITHUB_REF_NAME}

      - name: Notify Slack
        if: github.ref_name == 'main' && steps.commit.outputs.changed == 'true' && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        shell: bash
        env:
          START_DATE: ${{ steps.dates.outputs.start_date }}
          END_DATE: ${{ steps.dates.outputs.end_date }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          repo_name="${REPOSITORY#*/}"
          site_url="https://${REPOSITORY_OWNER}.github.io/${repo_name}/"
          commit_sha="$(git rev-parse HEAD)"
          commit_url="https://github.com/${REPOSITORY}/commit/${commit_sha}"

          if [ "$START_DATE" = "$END_DATE" ]; then
            update_label="$END_DATE"
            page_url="${site_url}archive_${END_DATE}.html"
            archive_label="View today's briefing"
          else
            update_label="${START_DATE} ~ ${END_DATE}"
            page_url="${site_url}"
            archive_label="View briefing home"
          fi

          export SITE_URL="$site_url"
          export PAGE_URL="$page_url"
          export UPDATE_LABEL="$update_label"
          export ARCHIVE_LABEL="$archive_label"
          export COMMIT_URL="$commit_url"
          export RAW_SLACK_WEBHOOK_URL="$SLACK_WEBHOOK_URL"

          python - <<'PY' > slack_payload.json
          import json
          import os

          payload = {
              "text": f"Daily news briefing updated: {os.environ['UPDATE_LABEL']}",
              "blocks": [
                  {
                      "type": "header",
                      "text": {
                          "type": "plain_text",
                          "text": "Daily news briefing updated",
                      },
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              f"*Updated target*: `{os.environ['UPDATE_LABEL']}`\n"
                              f"<{os.environ['PAGE_URL']}|{os.environ['ARCHIVE_LABEL']}> | "
                              f"<{os.environ['COMMIT_URL']}|View commit>"
                          ),
                      },
                  },
              ],
          }

          print(json.dumps(payload, ensure_ascii=False))
          PY

          webhook_url="$(python - <<'PY'
          import os
          print(os.environ.get("RAW_SLACK_WEBHOOK_URL", "").strip().strip('"').strip("'"))
          PY
          )"

          if [[ -z "$webhook_url" ]]; then
            echo "Slack webhook URL is empty after trimming."
            exit 0
          fi

          if [[ "$webhook_url" != https://hooks.slack.com/services/* && "$webhook_url" != https://hooks.slack-gov.com/services/* ]]; then
            echo "Slack webhook URL format looks invalid. Re-save SLACK_WEBHOOK_URL in GitHub Secrets without quotes or extra spaces."
            exit 0
          fi

          curl --fail --silent --show-error \
            -X POST \
            -H "Content-type: application/json" \
            --data @slack_payload.json \
            "$webhook_url"
