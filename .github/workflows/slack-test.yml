name: Slack Notification Test

on:
  workflow_dispatch:
    inputs:
      news_date:
        description: "Optional KST article date to test (YYYY-MM-DD). Defaults to yesterday."
        required: false
        type: string
      site_url:
        description: "Briefing site URL."
        required: false
        default: "https://daily-followup-real.pages.dev"
        type: string

permissions:
  contents: read

jobs:
  send-test:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      PYTHONIOENCODING: utf-8
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Send Slack article-format test notification
        env:
          INPUT_NEWS_DATE: ${{ github.event.inputs.news_date || '' }}
          INPUT_SITE_URL: ${{ github.event.inputs.site_url || 'https://daily-followup-real.pages.dev' }}
        run: |
          target_date="${INPUT_NEWS_DATE:-$(TZ=Asia/Seoul date -d 'yesterday' +%F)}"
          site_url="${INPUT_SITE_URL%/}"
          export target_date
          export site_url

          if [[ ! -f "archive_${target_date}.html" ]]; then
            python - <<'PY'
            from __future__ import annotations

            import os
            from pathlib import Path
            from urllib.error import HTTPError
            from urllib.request import Request, urlopen

            target_date = os.environ["target_date"]
            site_url = os.environ["site_url"].rstrip("/")
            destination = Path(f"archive_{target_date}.html")
            candidates = [
                f"{site_url}/archive_{target_date}.html",
                f"{site_url}/archive_{target_date}",
            ]
            last_error = None
            for url in candidates:
                try:
                    request = Request(url, headers={"User-Agent": "Mozilla/5.0"})
                    html = urlopen(request, timeout=30).read().decode("utf-8", errors="ignore")
                    destination.write_text(html, encoding="utf-8")
                    print(f"Downloaded {url} for Slack test.")
                    break
                except Exception as exc:
                    last_error = exc
            else:
                raise RuntimeError(f"Could not download archive_{target_date}.html from {site_url}: {last_error}")
            PY
          fi

          export SITE_URL="$site_url"
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          target_date = os.environ["target_date"]
          kst = timezone(timedelta(hours=9))
          Path("deploy_result.json").write_text(
              json.dumps(
                  {
                      "status": "updated",
                      "dates": [target_date],
                      "latest_archive": target_date,
                      "generated_at": datetime.now(kst).isoformat(),
                      "error": "",
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY

          python deploy/slack_notify.py success
