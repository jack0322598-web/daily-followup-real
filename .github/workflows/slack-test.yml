name: Slack Notification Test

on:
  workflow_dispatch:
    inputs:
      news_date:
        description: "Optional KST article date to test (YYYY-MM-DD). Defaults to yesterday."
        required: false
        type: string

permissions:
  contents: read

jobs:
  send-test:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      PYTHONIOENCODING: utf-8
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Send Slack article-format test notification
        env:
          INPUT_NEWS_DATE: ${{ github.event.inputs.news_date || '' }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          target_date="${INPUT_NEWS_DATE:-$(TZ=Asia/Seoul date -d 'yesterday' +%F)}"

          if [[ ! -f "archive_${target_date}.html" ]]; then
            echo "archive_${target_date}.html does not exist. Generate that date before sending the Slack article-format test."
            exit 1
          fi

          export target_date
          export SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}"
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          target_date = os.environ["target_date"]
          kst = timezone(timedelta(hours=9))
          Path("deploy_result.json").write_text(
              json.dumps(
                  {
                      "status": "updated",
                      "dates": [target_date],
                      "latest_archive": target_date,
                      "generated_at": datetime.now(kst).isoformat(),
                      "error": "",
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY

          python deploy/slack_notify.py success
