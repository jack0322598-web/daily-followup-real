name: Slack Notification Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-test:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      PYTHONIOENCODING: utf-8
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Send Slack article-format test notification
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          latest_archive="$(find . -maxdepth 1 -name 'archive_*.html' -printf '%f\n' | sed -E 's/^archive_([0-9-]+)\.html$/\1/' | sort | tail -n 1)"

          if [[ -z "$latest_archive" ]]; then
            echo "No archive file found for Slack test."
            exit 1
          fi

          export latest_archive
          export SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}"
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          latest_archive = os.environ["latest_archive"]
          kst = timezone(timedelta(hours=9))
          Path("deploy_result.json").write_text(
              json.dumps(
                  {
                      "status": "updated",
                      "dates": [latest_archive],
                      "latest_archive": latest_archive,
                      "generated_at": datetime.now(kst).isoformat(),
                      "error": "",
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY

          python deploy/slack_notify.py success
